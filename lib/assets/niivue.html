<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- NiiVue kütüphanesini en güncel sürümden internetten çekiyoruz -->
    <script src="./js/niivue.umd.js"></script>
    <style>
        body { margin: 0; padding: 0; background: black; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; outline: none; }
    </style>
</head>
<body>

<canvas id="gl"></canvas>

<script>
    var nv = new niivue.Niivue({
        backColor: [0, 0, 0, 1],
        show3Dcrosshair: false // 3D objede imlece gerek yok
    });
    nv.attachTo('gl');

    // Flutter ile bağlantı kur
    var bridgeCheckInterval = setInterval(function() {
        if (window.FlutterChannel) {
            clearInterval(bridgeCheckInterval);
            window.FlutterChannel.postMessage("READY");
        }
    }, 100);

    // Dosyayı Yükle
    async function loadLocalData(serverPort, fileName) {
        try {
            var fileUrl = "http://127.0.0.1:" + serverPort + "/" + encodeURIComponent(fileName);
            await nv.loadVolumes([{ url: fileUrl, name: fileName, colorMap: 'gray' }]);

            // 🔥 KESİN ÇÖZÜM: Dosya tamamen yüklendikten sonra motoru SADECE 3D moduna ZORLA
            nv.setSliceType(nv.sliceTypeRender);

            if (window.FlutterChannel) window.FlutterChannel.postMessage("LOADED");
        } catch (e) {
            if (window.FlutterChannel) window.FlutterChannel.postMessage("ERROR: " + e.message);
        }
    }

    // Maskeyi Yükle
    async function addMask(maskUrl, token) {
        try {
            var res = await fetch(maskUrl, { headers: { 'Authorization': 'Bearer ' + token }});
            if (!res.ok) return;
            var blob = await res.blob();
            var objUrl = URL.createObjectURL(blob);

            await nv.addVolumeFromUrl({ url: objUrl, name: 'mask.nii', colorMap: 'red', opacity: 0.6 });

            // Maske eklendikten sonra tekrar 3D modunu teyit et
            nv.setSliceType(nv.sliceTypeRender);
        } catch (e) {}
    }
</script>
</body>
</html>
